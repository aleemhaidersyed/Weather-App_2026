name: DevOps Weather App CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Grant permissions needed to write packages to GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
    # 1. Checkout repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 3. Install Dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    # 4. Start Flask Server
    - name: Start Flask Server
      run: |
        python backend/app.py &
        sleep 3

    # 5. Run integration tests
    - name: Run Integration Tests
      run: |
        chmod +x test_api.sh
        ./test_api.sh

    # 6. Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 🌟 NEW STEP: Log in to GitHub Container Registry (GHCR)
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} # Automatically generated by GitHub Actions

    # 🌟 NEW STEP: Build and Push the image to GHCR
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/weather-backend:latest
          ghcr.io/${{ github.repository_owner }}/weather-backend:${{ github.sha }}