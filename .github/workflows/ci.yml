name: DevOps Weather App CI Pipeline

# Trigger the pipeline on every push to the "main" branch
on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Spins up a clean, official Ubuntu VM in the cloud

    steps:
    # 1. Download the repository files to the runner VM
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Configure Python 3.12 environment on the runner
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 3. Install backend dependencies on the runner VM
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    # 4. Start the Flask application in the background on the runner
    - name: Start Flask Server
      run: |
        python backend/app.py &
        # Sleep for 3 seconds to give Flask time to boot up and bind to port 5000
        sleep 3

    # 5. Run our automated integration test script
    - name: Run Integration Tests
      run: |
        chmod +x test_api.sh
        ./test_api.sh

    # 6. Set up Docker Buildx (compiler plugin for Docker)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 7. Compile our Docker container image locally on the runner
    - name: Build Docker Image
      run: |
        docker build -t weather-backend:${{ github.sha }} backend/

    # 8. Run Trivy vulnerability scanner inside the runner VM
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.28.0  # ✅ Corrected version tag
      with:
        image-ref: 'weather-backend:${{ github.sha }}'
        format: 'table'
        exit-code: '1' # Fails the build (exits with 1) if vulnerabilities are found
        ignore-unfixed: true # Ignore issues that do not have a patch yet
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH' # Only block for High and Critical security holes