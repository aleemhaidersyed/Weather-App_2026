apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app: weather-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: weather-app
  template:
    metadata:
      labels:
        app: weather-app
    spec:
      containers:
      - name: backend
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
        
        # 🌟 ADD THIS BLOCK: Inject the secret as an environment variable
        env:
        - name: WEATHER_API_KEY
          valueFrom:
            secretKeyRef:
              name: weather-secrets
              key: WEATHER_API_KEY

        # Self-Healing Check 1: Is the container alive?
        livenessProbe:
          tcpSocket:
            port: {{ .Values.service.targetPort }}
          initialDelaySeconds: 15
          periodSeconds: 20
        
        # Self-Healing Check 2: Is the container ready to receive users?
        readinessProbe:
          httpGet:
            path: /api/weather?city=london # Pings the weather check route
            port: {{ .Values.service.targetPort }}
          initialDelaySeconds: 10
          periodSeconds: 15

        # CPU and Memory boundaries
        resources:
          {{- toYaml .Values.resources | nindent 10 }}